  <style>
    /* นำเข้าฟอนต์ภาษาไทย */
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap');

    .main-wrapper {
      font-family: 'Sarabun', sans-serif;
      max-width: 1200px;
      margin: auto;
      padding: 20px;
    }
    
    .header-section {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 20px;

    }
    
    .school-logo {

    .header-section h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: #2c3e50;
      margin: 0 0 5px 0;
    }

    .header-section p {
      font-size: 1.2rem;
      color: #7f8c8d;
      margin: 0;
    }
    
    .instruction-container {
        text-align: center;
        margin-bottom: 35px;
    }

    .instruction-text {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-style: italic;
      color: #95a5a6;
    }

    .card-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
    }

    .card-link {
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      width: 260px;
      padding: 25px;
      text-align: center;
      text-decoration: none;
      color: #34495e;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card-link:hover {
      transform: translateY(-8px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12);
    }

    /* โทนสีสำหรับการ์ดงานบุคคล */
    .color-1 { background-color: #E8EAF6; } /* Indigo Light */
    .color-2 { background-color: #E1F5FE; } /* Light Blue */
    .color-3 { background-color: #E0F2F1; } /* Teal Light */
    .color-4 { background-color: #FFFDE7; } /* Yellow Light */
    .color-5 { background-color: #F3E5F5; } /* Purple Light */
    .color-6 { background-color: #FBE9E7; } /* Deep Orange Light */
    .color-7 { background-color: #ECEFF1; } /* Blue Grey Light */

    .card-icon {
      font-size: 4rem;
      margin-bottom: 15px;
      line-height: 1;
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin: 0;
    }

      margin-top: 50px;
